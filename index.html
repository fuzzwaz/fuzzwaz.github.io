<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramy Fawaz — Technical Designer</title>
  <meta name="description" content="Senior Technical Designer at High Moon Studios. Call of Duty franchise contributor. Game systems, technical design, and interactive experiences." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav id="navbar">
    <div class="nav-inner">
      <a href="#hero" class="nav-logo">RF</a>
      <ul class="nav-links">
        <li><a href="#experience">Experience</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#" id="nav-resume" class="nav-resume" target="_blank" rel="noopener">Resume</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===== HERO ===== -->
  <section id="hero">
    <div class="hero-inner">

      <div class="hero-text">
        <p class="hero-intro" id="hero-intro"></p>
        <h1 class="hero-name" id="hero-name"></h1>
        <h2 class="hero-tagline" id="hero-tagline"></h2>
        <p class="hero-bio" id="hero-bio"></p>
        <div class="hero-cta">
          <a href="#experience" class="btn btn-primary">See My Work</a>
          <a href="#contact" class="btn btn-outline">Get In Touch</a>
        </div>
      </div>

      <div class="hero-video-wrap">
        <div class="video-embed-wrap">
          <iframe
            src="https://www.youtube.com/embed/uKayVqsKPKI?autoplay=1&mute=1&loop=1&playlist=uKayVqsKPKI&controls=0&rel=0&playsinline=1"
            allow="autoplay; encrypted-media"
            allowfullscreen
            frameborder="0"
            title="Game Reel">
          </iframe>
        </div>
      </div>

    </div>
  </section>

  <!-- ===== EXPERIENCE ===== -->
  <section id="experience">
    <div class="container">
      <h2 class="section-title">Work Experience</h2>
      <div class="experience-list" id="experience-list"></div>
    </div>
  </section>

  <!-- ===== PROJECTS ===== -->
  <section id="projects">
    <div class="container">
      <h2 class="section-title">Projects</h2>
      <div class="projects-grid" id="projects-grid"></div>
    </div>
  </section>

  <!-- ===== CONTACT ===== -->
  <section id="contact">
    <div class="container">
      <h2 class="section-title">Get In Touch</h2>
      <div class="contact-inner">
        <div class="contact-links">
          <a href="#" id="contact-email">Email</a>
          <a href="#" id="contact-linkedin" target="_blank" rel="noopener">LinkedIn</a>
          <a href="#" id="contact-youtube"  target="_blank" rel="noopener">YouTube</a>
          <a href="#" id="contact-resume"   target="_blank" rel="noopener">Resume</a>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>Designed &amp; Built by Ramy Fawaz</p>
    <p class="footer-sub">Hosted on GitHub Pages</p>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
